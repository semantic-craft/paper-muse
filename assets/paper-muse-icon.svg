<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="ink" cx="50%" cy="43%" r="76%">
      <stop offset="0" stop-color="#2B281F"/>
      <stop offset="1" stop-color="#13110B"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#EE7154" stop-opacity=".60"/>
      <stop offset=".5" stop-color="#DA5840" stop-opacity=".20"/>
      <stop offset="1" stop-color="#DA5840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fade" cx="52%" cy="43%" r="60%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <pattern id="grid" width="66" height="66" patternUnits="userSpaceOnUse">
      <path d="M66 0 H0 V66" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="2"/>
    </pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity=".26"/>
    </filter>
    <clipPath id="sq"><rect x="100" y="100" width="824" height="824" rx="185"/></clipPath>
    <mask id="fademask"><rect x="100" y="100" width="824" height="824" fill="url(#fade)"/></mask>
  </defs>

  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#ink)" filter="url(#sh)"/>

  <g clip-path="url(#sq)">
    <rect x="100" y="100" width="824" height="824" fill="url(#grid)" mask="url(#fademask)"/>
    <circle cx="310" cy="653" r="8" fill="#ffffff" opacity=".10"/>
    <circle cx="714" cy="710" r="7" fill="#ffffff" opacity=".09"/>
    <circle cx="398" cy="344" r="6" fill="#ffffff" opacity=".08"/>
    <circle cx="657" cy="291" r="6" fill="#ffffff" opacity=".07"/>
    <circle cx="627" cy="428" r="300" fill="url(#glow)"/>
    <path d="M344 527 A286 286 0 0 1 794 314" fill="none" stroke="#DA5840" stroke-opacity=".30" stroke-width="6" stroke-linecap="round"/>
    <path d="M432 600 A221 221 0 0 1 596 672" fill="none" stroke="#DA5840" stroke-opacity=".16" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(627 428)" fill="#E85F46">
      <rect x="-116" y="-15" width="232" height="30" rx="15"/>
      <rect x="-116" y="-15" width="232" height="30" rx="15" transform="rotate(60)"/>
      <rect x="-116" y="-15" width="232" height="30" rx="15" transform="rotate(120)"/>
    </g>
    <circle cx="627" cy="428" r="17" fill="#F8DCCB"/>
  </g>

  <rect x="100" y="100" width="824" height="824" rx="185" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="3"/>
