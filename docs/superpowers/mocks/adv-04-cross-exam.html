<!-- 盘问流（逐条过堂）· 对抗＝一场逐条过堂：红队盘问顺时间线下推，当前条放大受讯、已过条收窄成笔录，「未决」无据者以朱印『悬』最响、绝不放行 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>盘问流 · 对抗幕 · 论文构思者</title>
<style>
  /* ══ 内联 tokens.css（文稿台令牌，勿引新色系/新字体） ══ */
  :root {
    --paper: #F5F4F1;
    --ink: #1A1A17;
    --ink-2: #57534A;
    --hair: #E2E0DA;
    --hair-strong: #D3D0C8;
    --vermilion: #A83232;
    --gold: #9A7B2E;
    --own: #4F6B3A;
    --pt-view: #3A6B6E;
    --pt-theory: #6B4E7A;
    --pt-method: #9A7B2E;
    --sel-wash: rgba(168,50,50,0.06);
    --serif-zh: "Songti SC","STSong",serif;
    --serif-en: "New York","Iowan Old Style","Palatino",Georgia,serif;
    --kai: "Kaiti SC","STKaiti",serif;
    --mono: "SF Mono","SFMono-Regular",ui-monospace,Menlo,monospace;
    --sans: -apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  }
  html[data-theme="dark"] {
    --paper: #1C1B18;
    --ink: #E8E5DD;
    --ink-2: #A8A498;
    --hair: #33312B;
    --hair-strong: #45423A;
    --vermilion: #D8695C;
    --gold: #C6A94E;
    --own: #8FB06A;
    --pt-view: #6FA9AC;
    --pt-theory: #A88CB8;
    --pt-method: #C6A94E;
    --sel-wash: rgba(216,105,92,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif-zh);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--sel-wash); }
  :focus-visible { outline: 2px solid var(--vermilion); outline-offset: 2px; border-radius: 1px; }
  .vh {
    position: absolute; width: 1px; height: 1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap;
  }
  [hidden] { display: none !important; }

  /* ── 顶栏（沿用 tokens .topbar / .act-tab） ─────────── */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: baseline; gap: 24px;
    padding: 12px 28px;
    background: color-mix(in srgb, var(--paper) 94%, transparent);
    backdrop-filter: saturate(1.1) blur(6px);
    border-bottom: 1px solid var(--hair);
  }
  .wordmark { font-family: var(--serif-en); font-size: 15px; letter-spacing: .02em; color: var(--ink-2); white-space: nowrap; font-style: italic; }
  .wordmark b { font-style: normal; color: var(--ink); font-weight: 600; }
  .topic-field { flex: 1 1 auto; min-width: 0; display: flex; align-items: baseline; gap: 10px; }
  .topic-field label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); white-space: nowrap; }
  .topic-input { flex: 1 1 auto; min-width: 0; font-family: var(--serif-zh); font-size: 17px; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--hair-strong); padding: 2px 2px 4px; line-height: 1.4; }
  .topic-input:focus { border-bottom-color: var(--vermilion); outline: none; }
  .scan-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--paper); background: var(--ink); border: none; padding: 6px 14px; cursor: pointer; white-space: nowrap; }
  .scan-btn:hover { background: var(--vermilion); }
  .acts { display: flex; gap: 2px; white-space: nowrap; }
  .act-tab { font-family: var(--serif-zh); font-size: 15px; color: var(--ink-2); background: none; border: none; padding: 4px 4px 8px; cursor: pointer; border-bottom: 2px solid transparent; position: relative; }
  .act-tab.active { color: var(--ink); border-bottom-color: var(--vermilion); }
  .act-tab:not(.active):hover { color: var(--ink); }
  .act-sep { color: var(--hair-strong); align-self: center; padding-bottom: 4px; }
  .theme-btn { font-family: var(--mono); font-size: 13px; color: var(--ink-2); background: none; border: 1px solid var(--hair-strong); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; line-height: 1; flex: 0 0 auto; }
  .theme-btn:hover { border-color: var(--vermilion); color: var(--vermilion); }

  /* ── 主体单列 ──────────────────────────────────── */
  .hall {
    max-width: 880px;
    margin: 0 auto;
    padding: 26px 32px 90px;
  }

  /* ── 模式条：有稿 / 无稿 ───────────────────────── */
  .controls {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 14px 20px; margin-bottom: 22px;
  }
  .seg { display: inline-flex; border: 1px solid var(--hair-strong); }
  .seg-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--ink-2);
    background: transparent; border: none; padding: 6px 14px; cursor: pointer;
  }
  .seg-btn + .seg-btn { border-left: 1px solid var(--hair-strong); }
  .seg-btn.is-on { background: var(--ink); color: var(--paper); }
  .mini-lab { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); margin-right: 8px; }
  .draft-picks, .blank-input { display: flex; align-items: center; min-width: 0; }
  .draft-sel {
    font-family: var(--serif-zh); font-size: 14px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--hair-strong);
    padding: 3px 2px; max-width: 340px; cursor: pointer;
  }
  .draft-sel:focus { outline: none; border-bottom-color: var(--vermilion); }
  .claim-in {
    font-family: var(--serif-zh); font-size: 15px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--hair-strong);
    padding: 3px 2px; width: min(46vw, 380px);
  }
  .claim-in:focus { outline: none; border-bottom-color: var(--vermilion); }
  .ghost-btn {
    font-family: var(--serif-zh); font-size: 13px; color: var(--vermilion);
    background: transparent; border: 1px dashed var(--vermilion);
    padding: 4px 11px; cursor: pointer; margin-left: 12px; white-space: nowrap;
  }
  .ghost-btn:hover { background: var(--sel-wash); }

  /* ── 被告席（中心主张） ────────────────────────── */
  .dock {
    position: relative;
    border: 1px solid var(--hair-strong);
    border-top: 3px solid var(--ink);
    padding: 20px 24px 18px;
    margin-bottom: 34px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--ink) 3%, transparent), transparent 40%);
  }
  .dock.flash { animation: sent 1.1s ease-out; }
  @keyframes sent {
    0% { box-shadow: inset 0 0 0 2px var(--vermilion); }
    100% { box-shadow: inset 0 0 0 0 transparent; }
  }
  .dock-eyebrow {
    font-family: var(--mono); font-size: 10px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--ink-2); margin-bottom: 10px;
    display: flex; align-items: baseline; gap: 10px;
  }
  .dock-eyebrow .prov { color: var(--vermilion); letter-spacing: .06em; }
  .claim-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .claim-tab {
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
    color: var(--ink-2); background: transparent;
    border: 1px solid var(--hair-strong); padding: 3px 9px; cursor: pointer;
  }
  .claim-tab.is-on { border-color: var(--ink); color: var(--ink); }
  .claim-text {
    font-family: var(--serif-zh); font-weight: 600;
    font-size: clamp(21px, 2.6vw, 27px); line-height: 1.4;
    letter-spacing: .01em; margin: 2px 0 14px; color: var(--ink);
  }
  .claim-text .quo { color: var(--hair-strong); font-family: var(--serif-en); }
  .dock-tally {
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--ink-2); font-variant-numeric: tabular-nums;
    display: flex; flex-wrap: wrap; gap: 4px 16px; align-items: baseline;
  }
  .dock-tally .n { color: var(--ink); }
  .dock-tally .fatal { color: var(--vermilion); }
  .dock-tally .held { color: var(--vermilion); font-weight: 600; }
  .dock-empty { font-family: var(--kai); font-size: 16px; color: var(--ink-2); letter-spacing: .04em; }

  /* ── 识读钥（严重度 + 裁断分级） ───────────────── */
  .grade-key {
    margin-top: 14px; padding-top: 12px; border-top: 1px dotted var(--hair-strong);
    display: flex; flex-wrap: wrap; gap: 8px 22px; align-items: center;
    font-family: var(--mono); font-size: 10px; color: var(--ink-2);
  }
  .gk-group { display: inline-flex; align-items: center; gap: 8px; }
  .gk-lab { letter-spacing: .1em; text-transform: uppercase; }
  .gk-note { font-family: var(--kai); font-size: 12px; color: var(--vermilion); letter-spacing: .03em; }

  /* 裁断 chip 三级：solid（未决·最响）/ 描边（已证伪）/ 淡染（有佐证） */
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .06em;
    padding: 2px 9px; white-space: nowrap; border-radius: 1px;
  }
  .chip-held { background: var(--vermilion); color: var(--paper); font-weight: 600; }
  .chip-falsified { border: 1px solid var(--vermilion); color: var(--vermilion); background: transparent; }
  .chip-corrob { background: var(--sel-wash); color: var(--ink-2); border: 1px solid var(--hair-strong); }

  /* 严重度小签（发丝框 + 分量点） */
  .sev {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
    padding: 1px 7px; border: 1px solid var(--hair-strong);
  }
  .sev .bars { letter-spacing: -1px; }
  .sev-fatal { color: var(--vermilion); border-color: var(--vermilion); }
  .sev-major { color: var(--ink); }
  .sev-minor { color: var(--ink-2); }

  /* ── 盘问时间线 ───────────────────────────────── */
  .docket { position: relative; }
  .docket::before {
    content: ""; position: absolute; top: 6px; bottom: 34px;
    left: 20px; width: 2px; background: var(--hair-strong);
  }
  .docket-head {
    font-family: var(--mono); font-size: 10px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--ink-2);
    padding-left: 56px; margin-bottom: 6px;
  }

  .charge { position: relative; padding: 0 0 0 56px; }
  /* 时间线节点：形状/大小 = 严重度 */
  .charge::before {
    content: ""; position: absolute; left: 20px; top: 20px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--ink-2); transform: translate(-50%, -50%);
    z-index: 1; transition: box-shadow .2s;
  }
  .charge[data-sev="致命"]::before {
    width: 13px; height: 13px; border-radius: 1px;
    background: var(--vermilion); transform: translate(-50%, -50%) rotate(45deg);
  }
  .charge[data-sev="重大"]::before { background: var(--ink); }
  .charge[data-sev="存疑"]::before { background: transparent; border: 1.5px solid var(--ink-2); }
  /* 未决节点：静态朱色晕环（非闪烁警报），时间线上一眼锁定 */
  .charge[data-verdict="未决"]::before {
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--vermilion) 20%, transparent);
  }
  /* 当前受讯：外描一圈选中环 */
  .charge.is-focus::before {
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px var(--ink-2);
  }
  .charge.is-focus[data-verdict="未决"]::before {
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px var(--vermilion);
  }

  /* 收窄的已过条 / 待讯条：一行回顾 */
  .charge-head {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px 10px;
    width: 100%; text-align: left; cursor: pointer;
    font-family: inherit; color: inherit;
    background: transparent; border: none;
    padding: 12px 4px; border-top: 1px solid var(--hair);
  }
  .charge:first-child .charge-head { border-top: none; }
  .ch-seq {
    font-family: var(--mono); font-size: 10px; letter-spacing: .06em;
    color: var(--ink-2); font-variant-numeric: tabular-nums; flex: 0 0 auto;
  }
  .ch-type {
    font-family: var(--sans); font-size: 11px; color: var(--ink);
    background: var(--sel-wash); padding: 1px 8px; flex: 0 0 auto;
  }
  .ch-sum {
    flex: 1 1 260px; min-width: 0; font-family: var(--serif-zh);
    font-size: 14px; color: var(--ink-2); line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ch-plea {
    flex: 0 0 auto; font-family: var(--kai); font-size: 13px;
    color: var(--vermilion); letter-spacing: .05em;
  }
  .ch-plea .pk { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink-2); text-transform: uppercase; margin-right: 5px; }
  .charge:not(.is-ruled) .ch-plea { display: none; }
  .charge.is-focus .ch-sum { display: none; }

  /* 当前受讯：放大的详情体 */
  .charge-body { display: none; }
  .charge.is-focus .charge-body {
    display: block;
    margin: 2px 0 24px; padding: 20px 22px 22px;
    border: 1px solid var(--hair-strong);
    border-left: 2px solid var(--vermilion);
    background: linear-gradient(90deg, var(--sel-wash), transparent 72%);
  }
  .cb-kicker {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px;
    margin-bottom: 12px;
  }
  .cb-kicker .live {
    font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--vermilion); margin-left: auto;
  }
  .charge-statement {
    font-family: var(--serif-zh); font-weight: 600; font-size: 19px;
    line-height: 1.5; letter-spacing: .005em; color: var(--ink); margin: 0 0 4px;
  }
  .charge-statement::before {
    content: "红队诘"; font-family: var(--mono); font-size: 9px;
    letter-spacing: .12em; color: var(--ink-2); display: block;
    margin-bottom: 5px; text-transform: uppercase; font-weight: 400;
  }

  /* 审席之言：苛刻审稿人嗓音（楷体朱批 + 「诘」印） */
  .reviewer-note {
    margin: 16px 0 4px; padding: 3px 0 3px 18px;
    border-left: 2px solid var(--vermilion);
  }
  .reviewer-note .tag {
    font-family: var(--kai); font-size: 14px; color: var(--vermilion);
    letter-spacing: .05em; display: inline-block; margin-bottom: 2px;
  }
  .reviewer-note .tag::before {
    content: "诘"; display: inline-block;
    border: 1px solid var(--vermilion); color: var(--vermilion);
    font-family: var(--serif-zh); font-size: 11px;
    width: 18px; height: 18px; line-height: 16px; text-align: center;
    margin-right: 7px; vertical-align: 1px;
  }
  .reviewer-note p {
    margin: 0; font-family: var(--kai); font-size: 15.5px;
    line-height: 1.72; color: var(--ink); letter-spacing: .02em;
  }

  /* ── 裁断区 ───────────────────────────────────── */
  .verdict-zone { margin: 18px 0 6px; }

  /* 未决：solid 朱面板 —— 全条最响，绝不淡化 */
  .undecided {
    position: relative; background: var(--vermilion); color: var(--paper);
    padding: 15px 18px 16px;
  }
  .undecided .u-head {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  .undecided .u-verdict {
    font-family: var(--serif-zh); font-weight: 600; font-size: 22px;
    letter-spacing: .12em;
  }
  .undecided .u-seal {
    font-family: var(--serif-zh); font-size: 13px; letter-spacing: .05em;
    border: 1px solid color-mix(in srgb, var(--paper) 75%, transparent);
    padding: 1px 8px;
  }
  .undecided .u-rule {
    margin-left: auto; font-family: var(--mono); font-size: 11px;
    letter-spacing: .1em; text-transform: uppercase;
    color: color-mix(in srgb, var(--paper) 88%, transparent);
  }
  .undecided .u-why {
    font-family: var(--kai); font-size: 14.5px; line-height: 1.6;
    letter-spacing: .03em; margin: 9px 0 12px;
    color: color-mix(in srgb, var(--paper) 94%, transparent);
  }
  .undecided .u-density {
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    font-variant-numeric: tabular-nums; margin-bottom: 12px;
  }
  .undecided .u-density .zhnull { border-bottom: 1px dotted; }
  .u-unlock { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .u-unlock .ulab {
    font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: color-mix(in srgb, var(--paper) 80%, transparent);
  }
  .unlock-chip {
    font-family: var(--serif-zh); font-size: 12.5px; color: var(--paper);
    background: transparent; border: 1px solid color-mix(in srgb, var(--paper) 70%, transparent);
    padding: 3px 10px; cursor: pointer; letter-spacing: .03em;
  }
  .unlock-chip:hover { background: var(--paper); color: var(--vermilion); }
  .unlock-chip:focus-visible { outline: 2px solid var(--paper); outline-offset: 2px; }

  /* 已证伪 / 有佐证：裁断行 + 证据链 */
  .settled-line {
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px 12px;
    margin-bottom: 12px;
  }
  .settled-line .finding {
    font-family: var(--kai); font-size: 14px; color: var(--ink-2); letter-spacing: .03em;
  }
  .density-line {
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--ink-2); font-variant-numeric: tabular-nums; margin-bottom: 10px;
  }
  .density-line .zhnull { color: var(--gold); font-family: var(--serif-zh); font-size: 12px; }
  .density-line .gap { color: var(--vermilion); }

  .evi-lab {
    font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-2); margin-bottom: 5px;
  }
  .evidence { list-style: none; margin: 0; padding: 0; }
  .evidence li {
    display: flex; align-items: baseline; gap: 9px;
    margin-bottom: 7px; overflow-x: auto; white-space: nowrap; padding-bottom: 2px;
  }
  .evidence a {
    color: var(--ink); text-decoration: none;
    border-bottom: 1px solid var(--hair-strong);
    font-family: var(--sans); font-size: 12.5px;
  }
  .evidence a:hover { border-bottom-color: var(--vermilion); color: var(--vermilion); }
  .evidence .host { font-family: var(--mono); font-size: 10px; color: var(--ink-2); flex: 0 0 auto; }
  .stance {
    flex: 0 0 auto; font-family: var(--mono); font-size: 9px;
    letter-spacing: .06em; padding: 0 6px; border: 1px solid currentColor;
  }
  .stance-证伪 { color: var(--vermilion); }
  .stance-佐证 { color: var(--own); }

  /* ── 你的答辩（认 / 驳 / 存疑） —— 沿用 01 三键淡出 ── */
  .plea {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    margin-top: 20px;
  }
  .plea-lab {
    font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--ink-2); margin-right: 8px;
  }
  .plea-btn {
    font-family: var(--serif-zh); font-size: 14px; color: var(--ink-2);
    background: none; border: 1px solid var(--hair-strong); padding: 4px 16px;
    cursor: pointer; transition: opacity .18s, color .18s, border-color .18s, background .18s;
    letter-spacing: .1em;
  }
  .plea-btn:hover { color: var(--ink); border-color: var(--ink-2); }
  .plea[data-chosen] .plea-btn:not(.is-on) { opacity: .32; }
  .plea-btn.is-on { background: var(--ink); color: var(--paper); border-color: var(--ink); opacity: 1 !important; }
  .plea-mark {
    font-family: var(--kai); font-size: 13px; color: var(--vermilion);
    margin-left: 8px; opacity: 0; transition: opacity .2s;
  }
  .plea[data-chosen] .plea-mark { opacity: 1; }

  .acts-row { display: flex; flex-wrap: wrap; gap: 8px 10px; margin-top: 14px; }
  .mini-act {
    font-family: var(--serif-zh); font-size: 12.5px; color: var(--ink-2);
    background: transparent; border: 1px solid var(--hair); padding: 3px 11px;
    cursor: pointer; display: inline-flex; align-items: baseline; gap: 7px;
  }
  .mini-act:hover { border-color: var(--vermilion); color: var(--vermilion); }
  .mini-act .mk { font-family: var(--mono); font-size: 9px; letter-spacing: .06em; color: var(--ink-2); }

  /* ── 结案 · 产物 ───────────────────────────────── */
  .colophon {
    margin-top: 30px; padding: 22px 24px 24px;
    border: 1px solid var(--hair-strong); border-top: 3px solid var(--vermilion);
  }
  .colo-eyebrow {
    font-family: var(--mono); font-size: 10px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--ink-2); margin-bottom: 12px;
  }
  .colo-grid {
    display: flex; flex-wrap: wrap; align-items: center;
    justify-content: space-between; gap: 14px;
  }
  .colo-tally {
    font-family: var(--mono); font-size: 11px; letter-spacing: .04em;
    color: var(--ink-2); font-variant-numeric: tabular-nums;
    display: flex; flex-wrap: wrap; gap: 4px 16px;
  }
  .colo-tally .n { color: var(--ink); }
  .colo-tally .held { color: var(--vermilion); font-weight: 600; }
  .ship-btn {
    font-family: var(--mono); font-size: 11px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--paper); background: var(--ink);
    border: none; padding: 8px 16px; cursor: pointer; white-space: nowrap;
  }
  .ship-btn:hover { background: var(--vermilion); }
  .colo-soul {
    font-family: var(--kai); font-size: 15px; color: var(--vermilion);
    letter-spacing: .03em; line-height: 1.7; margin: 16px 0 4px;
  }
  details.md-peek { margin-top: 12px; }
  details.md-peek summary {
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--ink-2); cursor: pointer;
    list-style: none; padding: 3px 0; border-bottom: 1px solid var(--hair);
    display: inline-block;
  }
  details.md-peek summary::-webkit-details-marker { display: none; }
  details.md-peek summary::before { content: "＋ "; color: var(--vermilion); }
  details.md-peek[open] summary::before { content: "－ "; }
  .md-peek pre {
    font-family: var(--mono); font-size: 11px; line-height: 1.65; color: var(--ink);
    background: color-mix(in srgb, var(--ink) 4%, transparent);
    padding: 12px 14px; margin: 10px 0 0; overflow-x: auto;
  }
  .md-peek pre .k { color: var(--ink-2); }
  .md-peek pre .held { color: var(--vermilion); }

  /* ── toast ────────────────────────────────────── */
  .toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(14px);
    background: var(--ink); color: var(--paper);
    font-family: var(--serif-zh); font-size: 13.5px; letter-spacing: .03em;
    padding: 9px 18px; z-index: 50; pointer-events: none;
    opacity: 0; transition: opacity .22s, transform .22s; max-width: 88vw;
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── 流式入场（先抛问、后补裁断），尊重 reduced-motion ── */
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .stagger { opacity: 0; animation: rise .5s ease-out forwards; }
  .late { opacity: 0; animation: fadein .5s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) {
    .stagger, .late { animation: none !important; opacity: 1 !important; transform: none !important; }
    .dock.flash { animation: none !important; }
  }

  /* ── 窄窗降级（目标 900–1400；此为地板保护） ────── */
  @media (max-width: 620px) {
    .topbar { flex-wrap: wrap; gap: 10px 16px; }
    .topic-field { order: 3; flex-basis: 100%; }
    .hall { padding: 22px 18px 80px; }
    .charge { padding-left: 44px; }
    .docket::before { left: 15px; }
    .charge::before { left: 15px; }
    .docket-head { padding-left: 44px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="wordmark"><b>论文构思者</b> · 对抗幕</span>
  <div class="topic-field">
    <label for="topic">研究主题</label>
    <input id="topic" class="topic-input" type="text" value="平台经济中的数据权力与法律规制" aria-label="研究主题输入框">
  </div>
  <button class="scan-btn" id="openBtn" type="button" title="重演盘问（重放流式入场）">开审</button>
  <nav class="acts" aria-label="幕次切换">
    <button class="act-tab" id="backAct" type="button">构思幕</button>
    <span class="act-sep">·</span>
    <button class="act-tab active" type="button" aria-current="page">对抗幕</button>
  </nav>
  <button id="themeBtn" class="theme-btn" type="button" aria-label="切换明暗主题" title="切换明暗主题">☾</button>
</header>

<main class="hall">

  <!-- 模式条 -->
  <section class="controls" aria-label="稿件模式与来源">
    <div class="seg" role="group" aria-label="稿件模式">
      <button class="seg-btn is-on" type="button" data-mode="draft" aria-pressed="true">有稿</button>
      <button class="seg-btn" type="button" data-mode="blank" aria-pressed="false">无稿</button>
    </div>
    <div class="draft-picks" data-when="draft">
      <label class="mini-lab" for="draftSel">草稿</label>
      <select class="draft-sel" id="draftSel" aria-label="选择草稿"></select>
    </div>
    <div class="blank-input" data-when="blank" hidden>
      <label class="mini-lab" for="claimIn">主张</label>
      <input class="claim-in" id="claimIn" type="text" aria-label="输入一句待攻主张">
      <button class="ghost-btn" id="fromCard" type="button">从构思幕卡片送入</button>
    </div>
  </section>

  <!-- 被告席 -->
  <section class="dock" id="dock" aria-labelledby="claimText"></section>

  <!-- 盘问时间线 -->
  <div class="docket-head" id="docketHead">红队盘问 · 逐条过堂</div>
  <section class="docket" id="docket" aria-label="盘问时间线"></section>

  <!-- 结案 -->
  <footer class="colophon" id="colophon"></footer>

</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ══ 内联规范数据（抄自 BRIEF-adversarial.md，勿改） ══ */
const ADV_TOPIC = "平台经济中的数据权力与法律规制";
const ADV_DRAFTS = [
  { name: "01_成品稿/数据确权与平台反垄断_初稿.md", claims: [1, 2], picked: true },
  { name: "数据要素市场_论证提纲.md", claims: [] },
];
const ADV_CLAIMS = [
  {
    id: 1,
    text: "数据确权（明确数据归属）是破解平台数据垄断的前提。",
    from: "draft",
    failures: [
      { id: "1a", statement: "「确权」在民法（归属）与竞争法（市场支配）是两套问题，论证在两个层面之间滑移。",
        type: "概念滑坡", severity: "重大", verdict: "有佐证", en_hits: 42, zh_hits: 8,
        note: "法教义学审稿人会打——你用民法确权解竞争法问题，命题在两个层面反复偷换。",
        evidence: [
          { title: "Data Ownership vs. Market Dominance: Two Legal Registers", url: "https://doi.org/10.1093/jcle/nxae011", stance: "证伪" },
          { title: "数据财产权与反垄断规制的错位", url: "https://kns.cnki.net/kcms/sample-9012", stance: "佐证" },
        ] },
      { id: "1b", statement: "欧盟未确权、以 DMA 行为规制照样约束数据垄断——确权非必要条件。",
        type: "反例", severity: "致命", verdict: "已证伪", en_hits: 63, zh_hits: 3,
        note: "存在反例即证伪「前提」这一强命题；退到「有帮助」还能守，「前提」守不住。",
        evidence: [
          { title: "The DMA's Conduct Rules Without Ownership", url: "https://doi.org/10.2139/ssrn.4477201", stance: "证伪" },
        ] },
      { id: "1c", statement: "「确权→降低垄断」的因果机制未给出；确权可能反而强化头部平台（最有能力主张权利者）。",
        type: "机制缺环", severity: "致命", verdict: "未决", en_hits: 12, zh_hits: null,
        note: "红队最狠的一条：方向可能是反的，而你连机制都没写。检索未得直接证据——不放行。",
        evidence: [] },
      { id: "1d", statement: "主张是应然命题，却引实然确权立法进展作佐证，二者不同质。",
        type: "规范·实证混淆", severity: "存疑", verdict: "有佐证", en_hits: 27, zh_hits: 6,
        note: "「立法在推进」不等于「确权应当是前提」，是-应然跨越未搭桥。",
        evidence: [
          { title: "Is–Ought in Data Legislation Arguments", url: "https://doi.org/10.1111/jols.12488", stance: "证伪" },
        ] },
    ],
  },
  {
    id: 2,
    text: "裁判文书大数据能客观呈现法院对数据监管的真实立场。",
    from: "draft",
    failures: [
      { id: "2a", statement: "文书网选择性公开 + 撤诉不上网，样本非随机，任何回归都可能被样本偏差颠覆。",
        type: "样本偏差", severity: "致命", verdict: "已证伪", en_hits: 156, zh_hits: 34,
        note: "实证法学审稿人的标准杀招；不校正样本，「客观呈现」四个字站不住。",
        evidence: [
          { title: "Selection Bias in Chinese Judgment Datasets", url: "https://doi.org/10.1017/als.2022.19", stance: "证伪" },
          { title: "裁判文书网公开率与样本偏差", url: "https://kns.cnki.net/kcms/sample-3312", stance: "证伪" },
        ] },
      { id: "2b", statement: "把「立场」操作化为判决结果，忽略调解/不起诉/未成讼，构念效度存疑。",
        type: "内生性", severity: "重大", verdict: "未决", en_hits: 20, zh_hits: 5,
        note: "你测的是「判了的」，不是「立场」；未检得效度校验的先例——不放行。",
        evidence: [] },
      { id: "2c", statement: "相关 ≠ 因果：回归揭示的「裁量偏好」可能只是案由分布的假象。",
        type: "机制缺环", severity: "存疑", verdict: "有佐证", en_hits: 88, zh_hits: 12,
        note: "至少要做案由分层或断点，才敢从系数跳到「偏好」。",
        evidence: [
          { title: "Correlation, Case Mix, and Judicial Preference", url: "https://doi.org/10.1086/jls.2021.0207", stance: "佐证" },
        ] },
    ],
  },
];

/* ══ 小工具 ══ */
const $ = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => Array.from(el.querySelectorAll(s));
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const REDUCED = () => window.matchMedia("(prefers-reduced-motion: reduce)").matches;
function shortHost(url){
  try {
    const h = new URL(url).hostname.replace(/^www\./, '');
    if (h.includes("cnki")) return "cnki";
    if (h.includes("doi")) return "doi";
    return h;
  } catch(e){ return ""; }
}

const SEV_META = {
  "致命": { cls: "sev-fatal", bars: "▮▮▮" },
  "重大": { cls: "sev-major", bars: "▮▮"  },
  "存疑": { cls: "sev-minor", bars: "▮"   },
};
const VERDICT_META = {
  "未决":   { cls: "chip-held",      short: "未决 · 不放行" },
  "已证伪": { cls: "chip-falsified", short: "已证伪" },
  "有佐证": { cls: "chip-corrob",    short: "有佐证" },
};
const PLEA_LABEL = { "认": "采纳反对 · 认这条会崩", "驳": "驳回反对 · 给出理由", "存疑": "暂挂 · 待议" };

/* ══ 状态 ══ */
const state = { mode: "draft", draftIdx: ADV_DRAFTS.findIndex(d => d.picked), claimId: 1, focusId: null, pleas: {} };

function activeClaimIds(){
  if (state.mode === "blank") return [1];
  const d = ADV_DRAFTS[state.draftIdx];
  return d ? d.claims.slice() : [];
}
function currentClaim(){ return ADV_CLAIMS.find(c => c.id === state.claimId); }
function firstUnruled(failures){
  const u = failures.find(f => !state.pleas[f.id]);
  return (u || failures[0]).id;
}

/* ══ 被告席 ══ */
function provText(){
  if (state.mode === "blank") return "手输主张 · 单条受审";
  return "抽自草稿 · " + ADV_DRAFTS[state.draftIdx].name;
}
function renderDock(){
  const dock = $("#dock");
  const ids = activeClaimIds();
  if (!ids.length){
    dock.innerHTML =
      '<div class="dock-eyebrow">被告席 · 中心主张</div>' +
      '<p class="dock-empty">此稿未抽出中心主张——先在<b>构思幕</b>立论，再送来过堂。</p>';
    return;
  }
  const c = currentClaim();
  const tabs = (state.mode === "draft" && ids.length > 1)
    ? '<div class="claim-tabs" role="tablist" aria-label="切换受审主张">' + ids.map(id => {
        const cc = ADV_CLAIMS.find(x => x.id === id);
        return '<button class="claim-tab ' + (id === state.claimId ? 'is-on' : '') +
          '" type="button" role="tab" aria-selected="' + (id === state.claimId) +
          '" data-claim="' + id + '">主张 ' + String(id).padStart(2,'0') + '</button>';
      }).join("") + '</div>'
    : "";
  const f = c.failures;
  const fatal = f.filter(x => x.severity === "致命").length;
  const held = f.filter(x => x.verdict === "未决").length;
  const ruled = f.filter(x => state.pleas[x.id]).length;

  dock.innerHTML =
    '<div class="dock-eyebrow">被告席 · 中心主张 <span class="prov">' + esc(provText()) + '</span></div>' +
    tabs +
    '<h1 class="claim-text" id="claimText"><span class="quo">“</span>' + esc(c.text) + '<span class="quo">”</span></h1>' +
    '<div class="dock-tally" id="dockTally">' + dockTallyInner(f.length, fatal, held, ruled) + '</div>' +
    gradeKeyHTML();
}
function dockTallyInner(total, fatal, held, ruled){
  return '<span>待答盘问 <span class="n">' + total + '</span></span>' +
    '<span>致命 <span class="fatal">' + fatal + '</span></span>' +
    '<span>未决悬置 <span class="held">' + held + '</span>（不放行）</span>' +
    '<span>已答辩 <span class="n">' + ruled + ' / ' + total + '</span></span>';
}
function gradeKeyHTML(){
  return '<div class="grade-key">' +
    '<span class="gk-group"><span class="gk-lab">严重度</span>' +
      '<span class="sev sev-fatal"><span class="bars">▮▮▮</span>致命</span>' +
      '<span class="sev sev-major"><span class="bars">▮▮</span>重大</span>' +
      '<span class="sev sev-minor"><span class="bars">▮</span>存疑</span></span>' +
    '<span class="gk-group"><span class="gk-lab">裁断</span>' +
      '<span class="chip chip-held">未决</span>' +
      '<span class="chip chip-falsified">已证伪</span>' +
      '<span class="chip chip-corrob">有佐证</span></span>' +
    '<span class="gk-note">未决＝检索无据，最危：既未证伪也无佐证，不放行。</span>' +
  '</div>';
}

/* ══ 一条盘问 ══ */
function densityInline(f){
  if (f.zh_hits === null)
    return '英 ' + f.en_hits + ' · <span class="zhnull">中文面未检 · 需 CNKI 会话</span>';
  const gap = (f.en_hits >= f.zh_hits * 5) ? ' <span class="gap">⟵ 势差</span>' : '';
  return '英 ' + f.en_hits + ' · 中 ' + f.zh_hits + gap;
}
function evidenceHTML(f){
  const items = f.evidence.map(e =>
    '<li><span class="stance stance-' + e.stance + '">' + esc(e.stance) + '</span>' +
    '<a href="' + esc(e.url) + '" target="_blank" rel="noopener">' + esc(e.title) + '</a>' +
    '<span class="host">' + esc(shortHost(e.url)) + '</span></li>'
  ).join("");
  return '<div class="evi-lab">呈堂证据 · ' + f.evidence.length + ' 条</div><ul class="evidence">' + items + '</ul>';
}
function verdictZoneHTML(f){
  if (f.verdict === "未决"){
    const needCnki = f.zh_hits === null;
    const chips = ['<button class="unlock-chip" type="button" data-unlock="补检索">补检索</button>',
                   '<button class="unlock-chip" type="button" data-unlock="换检索词">换检索词</button>'];
    if (needCnki) chips.push('<button class="unlock-chip" type="button" data-unlock="挂 CNKI 会话">挂 CNKI 会话</button>');
    return '<div class="verdict-zone late"><div class="undecided">' +
      '<div class="u-head">' +
        '<span class="u-verdict">未决</span>' +
        '<span class="u-seal">悬</span>' +
        '<span class="u-rule">未检得证据 · 不放行</span>' +
      '</div>' +
      '<p class="u-why">' + esc(f.note) + '</p>' +
      '<div class="u-density">' + densityInline(f).replace(/class="zhnull"/g, 'class="zhnull"') + '</div>' +
      '<div class="u-unlock"><span class="ulab">解锁</span>' + chips.join("") + '</div>' +
    '</div></div>';
  }
  const vm = VERDICT_META[f.verdict];
  const finding = f.verdict === "已证伪" ? "检得反证 · 该命题按现表述不成立" : "检得佐证 · 反对意见有文献支撑，非决杀";
  return '<div class="verdict-zone late">' +
    '<div class="settled-line"><span class="chip ' + vm.cls + '">' + esc(f.verdict) + '</span>' +
      '<span class="finding">' + finding + '</span></div>' +
    '<div class="density-line">' + densityInline(f) + '</div>' +
    evidenceHTML(f) +
  '</div>';
}
function chargeHTML(f, i, n){
  const sev = SEV_META[f.severity];
  const vm = VERDICT_META[f.verdict];
  const plea = state.pleas[f.id];
  const ruledCls = plea ? " is-ruled" : "";
  const delay = (i * 110) + "ms";
  return '<article class="charge stagger' + ruledCls + '" id="charge-' + f.id +
      '" data-fid="' + f.id + '" data-sev="' + f.severity + '" data-verdict="' + f.verdict +
      '" style="animation-delay:' + delay + '">' +
    '<button class="charge-head" type="button" aria-expanded="false" aria-controls="body-' + f.id + '">' +
      '<span class="ch-seq">盘问 ' + (i+1) + ' / ' + n + '</span>' +
      '<span class="ch-type">' + esc(f.type) + '</span>' +
      '<span class="sev ' + sev.cls + '"><span class="bars">' + sev.bars + '</span>' + esc(f.severity) + '</span>' +
      '<span class="chip ' + vm.cls + '" style="animation-delay:' + (i*110+240) + 'ms">' + esc(vm.short) + '</span>' +
      '<span class="ch-sum">' + esc(f.statement) + '</span>' +
      '<span class="ch-plea"><span class="pk">答辩</span>' + (plea ? esc(plea) : '') + '</span>' +
    '</button>' +
    '<div class="charge-body" id="body-' + f.id + '" role="region" aria-label="盘问详情">' +
      '<div class="cb-kicker">' +
        '<span class="sev ' + sev.cls + '"><span class="bars">' + sev.bars + '</span>' + esc(f.severity) + '</span>' +
        '<span class="chip ' + vm.cls + '">' + esc(vm.short) + '</span>' +
        '<span class="live">当前受讯</span>' +
      '</div>' +
      '<p class="charge-statement">' + esc(f.statement) + '</p>' +
      '<div class="reviewer-note"><span class="tag">审席之言</span><p>' + esc(f.note) + '</p></div>' +
      verdictZoneHTML(f) +
      pleaHTML(f) +
      '<div class="acts-row">' +
        '<button class="mini-act" type="button" data-act="to-prove">送待证 <span class="mk">to-prove</span></button>' +
        '<button class="mini-act" type="button" data-act="diagnose">深诊 <span class="mk">diagnose</span></button>' +
      '</div>' +
    '</div>' +
  '</article>';
}
function pleaHTML(f){
  const plea = state.pleas[f.id];
  const chosen = plea ? ' data-chosen="' + esc(plea) + '"' : '';
  const keys = ["认","驳","存疑"].map(k =>
    '<button class="plea-btn ' + (plea === k ? 'is-on' : '') + '" type="button" data-plea="' + k +
    '" title="' + PLEA_LABEL[k] + '"' + (plea === k ? ' aria-pressed="true"' : '') + '>' + k + '</button>'
  ).join("");
  return '<div class="plea" role="group" aria-label="你对这条盘问的答辩"' + chosen + '>' +
    '<span class="plea-lab">你的答辩</span>' + keys + '<span class="plea-mark">✓ 已录笔录</span></div>';
}

/* ══ 结案 · 产物 ══ */
function renderColophon(){
  const foot = $("#colophon");
  const ids = activeClaimIds();
  if (!ids.length){ foot.innerHTML = ''; foot.hidden = true; return; }
  foot.hidden = false;
  const c = currentClaim();
  const f = c.failures;
  const held = f.filter(x => x.verdict === "未决").length;
  const fatal = f.filter(x => x.severity === "致命").length;
  const ruled = f.filter(x => state.pleas[x.id]).length;
  const soul = held > 0
    ? '未决 ' + held + ' 项未放行——补齐证据之前，勿以「看起来没问题」结案。'
    : '本席无未决——但已证伪与佐证仍需落定，方可动笔。';
  foot.innerHTML =
    '<div class="colo-eyebrow">结案 · 产物</div>' +
    '<div class="colo-grid">' +
      '<div class="colo-tally" id="coloTally">' + coloTallyInner(f.length, ruled, held, fatal) + '</div>' +
      '<button class="ship-btn" id="shipBtn" type="button">落 failure-points.md</button>' +
    '</div>' +
    '<p class="colo-soul">' + esc(soul) + '</p>' +
    '<details class="md-peek"><summary>failure-points.md 预览</summary><pre>' + mdPreview(c) + '</pre></details>';
}
function coloTallyInner(total, ruled, held, fatal){
  return '<span>盘问 <span class="n">' + total + '</span></span>' +
    '<span>已答辩 <span class="n">' + ruled + '</span></span>' +
    '<span>未决悬置 <span class="held">' + held + '</span></span>' +
    '<span>致命 <span class="n">' + fatal + '</span></span>';
}
function mdPreview(c){
  const held = c.failures.filter(x => x.verdict === "未决").length;
  let out = '<span class="k">---</span>\n';
  out += '<span class="k">topic:</span> ' + esc(ADV_TOPIC) + '\n';
  out += '<span class="k">claim:</span> ' + esc(c.text) + '\n';
  out += '<span class="k">via:</span> 对抗幕 · 红队逐条过堂\n';
  out += '<span class="k">failure_points:</span> ' + c.failures.length + '\n';
  out += '<span class="k">held_undecided:</span> <span class="held">' + held + '</span>  # 未检得证据 · 不放行\n';
  out += '<span class="k">---</span>\n';
  c.failures.forEach(f => {
    const plea = state.pleas[f.id] ? '  · 你的答辩：' + esc(state.pleas[f.id]) : '';
    out += '\n## ' + f.id + ' · ' + esc(f.type) + ' · ' + f.severity + ' · ';
    out += (f.verdict === "未决" ? '<span class="held">未决（不放行）</span>' : f.verdict) + plea + '\n';
  });
  return out;
}

/* ══ 组装一幕 ══ */
function renderStage(replay){
  renderDock();
  const docket = $("#docket");
  const head = $("#docketHead");
  const ids = activeClaimIds();
  if (!ids.length){ docket.innerHTML = ''; head.style.display = 'none'; renderColophon(); return; }
  head.style.display = '';
  const c = currentClaim();
  const n = c.failures.length;
  state.focusId = firstUnruled(c.failures);
  docket.innerHTML = c.failures.map((f, i) => chargeHTML(f, i, n)).join("");
  // 当前受讯条放大
  applyFocus(state.focusId, false);
  renderColophon();
  if (replay && REDUCED()) return; // reduced-motion：不重放
}

/* ══ 聚焦（就地，不重排、不重放 stagger） ══ */
function applyFocus(fid, scroll){
  state.focusId = fid;
  $$(".charge").forEach(ch => {
    const on = ch.dataset.fid === fid;
    ch.classList.toggle("is-focus", on);
    const head = $(".charge-head", ch);
    if (head) head.setAttribute("aria-expanded", on ? "true" : "false");
  });
  if (scroll){
    const el = document.getElementById("charge-" + fid);
    if (el) el.scrollIntoView({ behavior: REDUCED() ? "auto" : "smooth", block: "center" });
  }
}

/* ══ 答辩（就地更新 + 推进） ══ */
function recordPlea(fid, key){
  state.pleas[fid] = key;
  const ch = document.getElementById("charge-" + fid);
  if (ch){
    ch.classList.add("is-ruled");
    const grp = $(".plea", ch);
    grp.setAttribute("data-chosen", key);
    $$(".plea-btn", grp).forEach(b => {
      const on = b.dataset.plea === key;
      b.classList.toggle("is-on", on);
      if (on) b.setAttribute("aria-pressed", "true"); else b.removeAttribute("aria-pressed");
    });
    const chp = $(".ch-plea", ch);
    if (chp) chp.innerHTML = '<span class="pk">答辩</span>' + esc(key);
  }
  refreshTallies();
  // 推进到下一条未答辩
  const c = currentClaim();
  const next = c.failures.find(f => !state.pleas[f.id]);
  if (next){
    const delay = REDUCED() ? 0 : 260;
    setTimeout(() => applyFocus(next.id, true), delay);
  }
}
function refreshTallies(){
  const c = currentClaim();
  if (!c) return;
  const f = c.failures;
  const fatal = f.filter(x => x.severity === "致命").length;
  const held = f.filter(x => x.verdict === "未决").length;
  const ruled = f.filter(x => state.pleas[x.id]).length;
  const dt = $("#dockTally"); if (dt) dt.innerHTML = dockTallyInner(f.length, fatal, held, ruled);
  const ct = $("#coloTally"); if (ct) ct.innerHTML = coloTallyInner(f.length, ruled, held, fatal);
  const peek = $(".md-peek pre"); if (peek) peek.innerHTML = mdPreview(c);
}

/* ══ 草稿选择器 ══ */
function renderDraftSel(){
  const sel = $("#draftSel");
  sel.innerHTML = ADV_DRAFTS.map((d, i) =>
    '<option value="' + i + '"' + (i === state.draftIdx ? ' selected' : '') + '>' +
    esc(d.name) + (d.claims.length ? '（主张 ' + d.claims.length + '）' : '（未立论）') + '</option>'
  ).join("");
}

/* ══ toast ══ */
let toastTimer = null;
function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("on"), 1900);
}

/* ══ 模式切换 ══ */
function setMode(mode){
  state.mode = mode;
  $$(".seg-btn").forEach(b => {
    const on = b.dataset.mode === mode;
    b.classList.toggle("is-on", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
  $$("[data-when]").forEach(el => { el.hidden = el.dataset.when !== mode; });
  const ids = activeClaimIds();
  if (ids.length && !ids.includes(state.claimId)) state.claimId = ids[0];
  renderStage(false);
}

/* ══ 事件委托 ══ */
function wire(){
  // 主题
  const tbtn = $("#themeBtn"), root = document.documentElement;
  tbtn.addEventListener("click", () => {
    const dark = root.getAttribute("data-theme") === "dark";
    root.setAttribute("data-theme", dark ? "light" : "dark");
    tbtn.textContent = dark ? "☾" : "☀";
    tbtn.setAttribute("aria-label", dark ? "切换到暗色主题" : "切换到亮色主题");
  });
  // 开审：重放流式入场
  $("#openBtn").addEventListener("click", () => {
    if (REDUCED()){ toast("开审 · 重演盘问（已减弱动效）"); return; }
    $$(".charge.stagger").forEach((e, i) => {
      e.style.animation = "none"; void e.offsetHeight;
      e.style.animation = "rise .5s ease-out " + (i * 110) + "ms forwards";
    });
    $$(".late").forEach((e) => {
      e.style.animation = "none"; void e.offsetHeight;
      e.style.animation = "fadein .5s ease-out 320ms forwards";
    });
    toast("开审 · 红队逐条抛出盘问");
  });
  // 返回构思幕（占位）
  $("#backAct").addEventListener("click", () => toast("← 返回构思幕（占位 · 盲区扫描卡片墙）"));
  // 模式段
  $$(".seg-btn").forEach(b => b.addEventListener("click", () => setMode(b.dataset.mode)));
  // 草稿选择
  $("#draftSel").addEventListener("change", (e) => {
    state.draftIdx = parseInt(e.target.value, 10);
    const ids = activeClaimIds();
    if (ids.length) state.claimId = ids[0];
    renderStage(false);
  });
  // 无稿：从构思幕卡片送入
  $("#fromCard").addEventListener("click", () => {
    state.claimId = 1;
    $("#claimIn").value = ADV_CLAIMS[0].text;
    renderStage(false);
    const dock = $("#dock");
    if (!REDUCED()){ dock.classList.remove("flash"); void dock.offsetHeight; dock.classList.add("flash"); }
    toast("已从构思幕卡片『数据确权…』送入被告席");
  });
  $("#claimIn").addEventListener("keydown", (e) => {
    if (e.key === "Enter"){ e.preventDefault(); renderStage(false); toast("重开盘问"); }
  });
  // 委托：被告席主张切换、盘问聚焦/答辩/动作、结案
  document.body.addEventListener("click", (e) => {
    const claimTab = e.target.closest(".claim-tab");
    if (claimTab){ state.claimId = parseInt(claimTab.dataset.claim, 10); renderStage(false); return; }
    const pleaBtn = e.target.closest(".plea-btn");
    if (pleaBtn){
      const ch = pleaBtn.closest(".charge");
      recordPlea(ch.dataset.fid, pleaBtn.dataset.plea);
      return;
    }
    const unlock = e.target.closest(".unlock-chip");
    if (unlock){ toast("（视觉稿）" + unlock.dataset.unlock + " → 重跑双面检索后再裁"); return; }
    const act = e.target.closest(".mini-act");
    if (act){
      const ch = act.closest(".charge");
      toast(act.dataset.act === "to-prove"
        ? "盘问 " + ch.dataset.fid + " → 送「待证」队列"
        : "盘问 " + ch.dataset.fid + " → 转「诊断」深挖");
      return;
    }
    const ship = e.target.closest("#shipBtn");
    if (ship){ toast("已落 failure-points.md（视觉稿 · 未决项标记不放行）"); return; }
    const head = e.target.closest(".charge-head");
    if (head){ applyFocus(head.closest(".charge").dataset.fid, false); return; }
  });
}

/* ══ 启动 ══ */
$("#topic").value = ADV_TOPIC;
$("#claimIn").value = ADV_CLAIMS[0].text;
renderDraftSel();
renderStage(false);
wire();
</script>
</body>
</html>
