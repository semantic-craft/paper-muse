<!-- 拆解阵（主张解剖）· 主张即承重结构：地基·前提→主梁·推理→顶板·结论，失败点按攻击位置挂成应力点；『未决』是强度未测的那根梁，悬红标为「最先断」——无证据不放行，即结构不予签发。 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆解阵 · 对抗幕 · 论文构思者</title>
<style>
  /* ══ 内联 _shared/tokens.css（文稿台令牌，勿改配色/字族） ══ */
  :root {
    --paper: #F5F4F1;
    --ink: #1A1A17;
    --ink-2: #57534A;
    --hair: #E2E0DA;
    --hair-strong: #D3D0C8;
    --vermilion: #A83232;
    --gold: #9A7B2E;
    --own: #4F6B3A;
    --pt-view: #3A6B6E;
    --pt-theory: #6B4E7A;
    --pt-method: #9A7B2E;
    --sel-wash: rgba(168,50,50,0.06);
    --serif-zh: "Songti SC","STSong",serif;
    --serif-en: "New York","Iowan Old Style","Palatino",Georgia,serif;
    --kai: "Kaiti SC","STKaiti",serif;
    --mono: "SF Mono","SFMono-Regular",ui-monospace,Menlo,monospace;
    --sans: -apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  }
  html[data-theme="dark"] {
    --paper: #1C1B18;
    --ink: #E8E5DD;
    --ink-2: #A8A498;
    --hair: #33312B;
    --hair-strong: #45423A;
    --vermilion: #D8695C;
    --gold: #C6A94E;
    --own: #8FB06A;
    --pt-view: #6FA9AC;
    --pt-theory: #A88CB8;
    --pt-method: #C6A94E;
    --sel-wash: rgba(216,105,92,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif-zh);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--sel-wash); }
  :focus-visible { outline: 2px solid var(--vermilion); outline-offset: 2px; border-radius: 1px; }

  /* ── 顶栏（沿用 tokens .topbar） ── */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: baseline; gap: 24px;
    padding: 12px 28px;
    background: color-mix(in srgb, var(--paper) 94%, transparent);
    backdrop-filter: saturate(1.1) blur(6px);
    border-bottom: 1px solid var(--hair);
  }
  .wordmark { font-family: var(--serif-en); font-size: 15px; letter-spacing: .02em; color: var(--ink-2); white-space: nowrap; font-style: italic; }
  .wordmark b { font-style: normal; color: var(--ink); font-weight: 600; }
  .topic-field { flex: 1 1 auto; min-width: 0; display: flex; align-items: baseline; gap: 10px; }
  .topic-field label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); white-space: nowrap; }
  .topic-input { flex: 1 1 auto; min-width: 0; font-family: var(--serif-zh); font-size: 17px; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--hair-strong); padding: 2px 2px 4px; line-height: 1.4; }
  .topic-input:focus { border-bottom-color: var(--vermilion); outline: none; }
  .scan-btn { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--paper); background: var(--ink); border: none; padding: 6px 14px; cursor: pointer; white-space: nowrap; }
  .scan-btn:hover { background: var(--vermilion); }
  .acts { display: flex; gap: 2px; white-space: nowrap; }
  .act-tab { font-family: var(--serif-zh); font-size: 15px; color: var(--ink-2); background: none; border: none; padding: 4px 4px 8px; cursor: pointer; border-bottom: 2px solid transparent; position: relative; }
  .act-tab.active { color: var(--ink); border-bottom-color: var(--vermilion); }
  .act-tab[disabled] { color: var(--ink-2); opacity: .5; cursor: not-allowed; }
  .act-sep { color: var(--hair-strong); align-self: center; padding-bottom: 4px; }
  .theme-btn { font-family: var(--mono); font-size: 13px; color: var(--ink-2); background: none; border: 1px solid var(--hair-strong); border-radius: 50%; width: 30px; height: 30px; cursor: pointer; line-height: 1; flex: 0 0 auto; }
  .theme-btn:hover { border-color: var(--vermilion); color: var(--vermilion); }

  /* ── 解剖台头 sub-bar：模式 + 草稿/输入 + 签发 ── */
  .bench-bar {
    position: sticky; top: 54px; z-index: 25;
    display: flex; align-items: center; gap: 16px 20px; flex-wrap: wrap;
    padding: 9px 28px;
    background: color-mix(in srgb, var(--paper) 96%, transparent);
    backdrop-filter: saturate(1.1) blur(6px);
    border-bottom: 1px solid var(--hair);
  }
  .mode-seg { display: inline-flex; border: 1px solid var(--hair-strong); }
  .mode-seg button {
    font-family: var(--serif-zh); font-size: 13px; color: var(--ink-2);
    background: none; border: none; padding: 4px 14px; cursor: pointer;
    border-right: 1px solid var(--hair-strong); line-height: 1.5;
  }
  .mode-seg button:last-child { border-right: none; }
  .mode-seg button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }
  .bench-ctx { display: flex; align-items: center; gap: 12px; flex: 1 1 340px; min-width: 0; }
  .ctx-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); white-space: nowrap; }
  .draft-select {
    font-family: var(--serif-zh); font-size: 13px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--hair-strong);
    padding: 3px 20px 4px 2px; cursor: pointer; max-width: 100%; min-width: 0; text-overflow: ellipsis;
    -webkit-appearance: none; appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--ink-2) 50%), linear-gradient(135deg, var(--ink-2) 50%, transparent 50%);
    background-position: right 8px top 60%, right 3px top 60%;
    background-size: 5px 5px, 5px 5px; background-repeat: no-repeat;
  }
  .draft-select:focus { border-bottom-color: var(--vermilion); outline: none; }
  .claim-in {
    flex: 1 1 auto; min-width: 0;
    font-family: var(--serif-zh); font-size: 15px; color: var(--ink);
    background: transparent; border: none; border-bottom: 1px solid var(--hair-strong);
    padding: 3px 2px 4px; line-height: 1.4;
  }
  .claim-in:focus { border-bottom-color: var(--vermilion); outline: none; }
  .claim-in.pulse { animation: inpulse .7s ease-out; }
  @keyframes inpulse { 0%{ background: var(--sel-wash);} 100%{ background: transparent;} }
  .send-card {
    font-family: var(--serif-zh); font-size: 12.5px; color: var(--vermilion);
    background: none; border: 1px solid var(--vermilion); padding: 4px 11px; cursor: pointer;
    white-space: nowrap; line-height: 1.4;
  }
  .send-card:hover { background: var(--vermilion); color: var(--paper); }
  .file-btn {
    margin-left: auto; font-family: var(--mono); font-size: 11px; letter-spacing: .06em;
    color: var(--ink); background: none; border: 1px solid var(--ink); padding: 5px 13px; cursor: pointer; white-space: nowrap;
  }
  .file-btn:hover { background: var(--ink); color: var(--paper); }
  .file-btn .dot { color: var(--vermilion); }
  .file-btn:hover .dot { color: var(--paper); }

  /* ── 双栏：立面 · 承重总览 | 承重逐层 · 应力点 ── */
  .slab {
    display: grid;
    grid-template-columns: minmax(322px, 398px) minmax(0, 1fr);
    max-width: 1330px; margin: 0 auto; align-items: start; gap: 0;
  }

  /* ── 左：立面（sticky） ── */
  .elev-col { position: sticky; top: 104px; align-self: start; padding: 32px 30px 40px 28px; }
  .subj-plate {
    display: inline-flex; align-items: center; gap: 7px; margin-bottom: 12px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--vermilion);
  }
  .subj-plate::before, .subj-plate::after { content: ""; height: 1px; width: 18px; background: var(--vermilion); opacity: .55; }
  .subj-lead { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); display: block; margin-bottom: 6px; }
  .subj-text {
    font-family: var(--serif-zh); font-weight: 600; font-size: 22px; line-height: 1.44;
    letter-spacing: .01em; color: var(--ink); margin: 0 0 4px; text-wrap: pretty;
  }
  .subj-text .load { border-bottom: 2px solid var(--vermilion); padding-bottom: 1px; }

  /* 承重结构立面图 */
  .elevation { position: relative; margin: 20px 0 6px; }
  .load-arrow {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: var(--mono); font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink-2);
    margin-bottom: 5px;
  }
  .load-arrow .ar { font-size: 15px; line-height: 1; color: var(--ink-2); }
  .mbar {
    display: block; width: 100%; text-align: left; cursor: pointer; position: relative;
    font-family: var(--sans); color: var(--ink);
    border: 1px solid var(--hair-strong); background: transparent;
    padding: 8px 12px; line-height: 1.3;
  }
  .mbar:hover { border-color: var(--ink-2); }
  .mbar .m-top { display: flex; align-items: baseline; gap: 8px; }
  .mbar .m-pos { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); }
  .mbar .m-name { font-family: var(--serif-zh); font-size: 14px; font-weight: 600; color: var(--ink); }
  .mbar .m-haz { margin-left: auto; font-family: var(--kai); font-size: 12.5px; letter-spacing: .04em; white-space: nowrap; }
  .mbar .m-meta { font-family: var(--mono); font-size: 10px; color: var(--ink-2); margin-top: 3px; font-variant-numeric: tabular-nums; }
  /* 承重角色 → 厚薄（主梁最厚，拉索最薄） */
  .mbar.role-apex { min-height: 42px; }
  .mbar.role-beam { min-height: 58px; border-width: 1px; }
  .mbar.role-base { min-height: 46px; }
  .mbar.role-brace { min-height: 34px; margin-left: 42px; width: calc(100% - 42px); border-style: dashed; }
  /* 危度四态：完好 / 载·有佐证 / 断·已证伪 / 悬·未决 */
  .mbar.intact { color: var(--ink-2); }
  .mbar.intact .m-haz { color: var(--own); }
  .mbar.bearing { border-color: var(--vermilion); border-width: 1.5px; background: var(--sel-wash); }
  .mbar.bearing .m-haz { color: var(--vermilion); }
  .mbar.fractured {
    border-color: var(--ink); color: var(--paper);
    background: repeating-linear-gradient(122deg, var(--ink) 0 9px, color-mix(in srgb, var(--ink) 74%, var(--paper)) 9px 10px);
  }
  .mbar.fractured .m-pos, .mbar.fractured .m-name, .mbar.fractured .m-meta { color: var(--paper); }
  .mbar.fractured .m-haz { color: var(--paper); }
  .mbar.pending {
    border-color: var(--vermilion); border-width: 2px;
    background: color-mix(in srgb, var(--vermilion) 12%, var(--paper));
    box-shadow: 0 0 0 3px var(--sel-wash), 0 0 20px -8px var(--vermilion);
    animation: stress 2.6s ease-in-out infinite;
  }
  .mbar.pending .m-name { color: var(--ink); }
  .mbar.pending .m-haz { color: var(--vermilion); font-weight: 600; }
  @keyframes stress {
    0%,100% { box-shadow: 0 0 0 3px var(--sel-wash), 0 0 18px -9px var(--vermilion); }
    50%     { box-shadow: 0 0 0 3px var(--sel-wash), 0 0 26px -3px var(--vermilion); }
  }
  .mbar .first-break {
    position: absolute; top: -9px; right: 10px;
    font-family: var(--mono); font-size: 8px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--paper); background: var(--vermilion); padding: 1px 6px; white-space: nowrap;
  }
  .mbar.lit-src { outline: 2px solid var(--vermilion); outline-offset: 2px; }
  /* 载荷传递接头（梁间短连线，随下方成员危度着色） */
  .joint { height: 13px; width: 2px; margin: 0 auto; background: var(--hair-strong); }
  .joint.hot { background: var(--vermilion); }
  .joint.ink { background: var(--ink); }
  .joint.brace-tie { height: 2px; width: 42px; margin: 0 0 0 12px; }
  /* 地基地面符号 */
  .ground {
    height: 9px; margin-top: 2px;
    background: repeating-linear-gradient(45deg, var(--ink-2) 0 1px, transparent 1px 6px);
    opacity: .5;
  }
  .elev-cap {
    font-family: var(--sans); font-size: 11px; line-height: 1.6; color: var(--ink-2);
    margin: 12px 0 0; border-top: 1px solid var(--hair); padding-top: 10px;
  }
  .elev-cap b { color: var(--vermilion); font-weight: 400; font-family: var(--serif-zh); }

  /* 结构判语 + 险情盘点 */
  .verdict-line {
    font-family: var(--serif-zh); font-size: 13.5px; line-height: 1.62; color: var(--ink);
    margin: 14px 0 0; padding: 10px 13px; border-left: 2px solid var(--vermilion); background: var(--sel-wash);
  }
  .verdict-line .broke { color: var(--ink); font-weight: 600; }
  .verdict-line .sway { color: var(--vermilion); font-weight: 600; }
  .verdict-line .tail { display: block; margin-top: 3px; font-family: var(--kai); font-size: 13.5px; color: var(--vermilion); letter-spacing: .04em; }
  .verdict-line .tail.calm { color: var(--own); }
  .tally { display: flex; flex-wrap: wrap; gap: 4px 14px; margin-top: 12px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .tally b { color: var(--ink); font-weight: 600; }
  .tally .warn { color: var(--vermilion); font-weight: 600; }

  .alts { margin-top: 22px; }
  .alts h2 { font-family: var(--mono); font-size: 10px; font-weight: 400; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); margin: 0 0 8px; }
  .alt { display: block; width: 100%; text-align: left; cursor: pointer; font-family: var(--serif-zh); font-size: 13.5px; line-height: 1.5; color: var(--ink-2); background: none; border: none; border-top: 1px solid var(--hair); padding: 9px 2px 9px 0; }
  .alt:last-child { border-bottom: 1px solid var(--hair); }
  .alt:hover { color: var(--ink); }
  .alt .an { font-family: var(--mono); font-size: 10px; color: var(--vermilion); margin-right: 6px; }
  .alt .amx { font-family: var(--mono); font-size: 10px; color: var(--vermilion); margin-left: 5px; }
  .elev-source { margin-top: 20px; font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--ink-2); line-height: 1.7; word-break: break-all; }
  .elev-source .k { color: var(--ink); }

  /* ── 右：承重逐层 ── */
  .strata { border-left: 2px solid var(--ink); padding: 30px 26px 150px 0; min-width: 0; }
  .strata-head { padding-left: 40px; margin-bottom: 8px; }
  .strata-head .eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); }
  .strata-head h1 { font-family: var(--serif-zh); font-weight: 600; font-size: 20px; line-height: 1.35; margin: 3px 0 0; color: var(--ink); }
  .strata-head h1 .n { color: var(--vermilion); }

  .legend { padding-left: 40px; margin: 10px 0 4px; font-family: var(--sans); font-size: 11px; color: var(--ink-2); line-height: 1.9; }
  .legend .row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px; }
  .legend .lg { display: inline-flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 12px; height: 12px; flex: 0 0 auto; }
  .legend .sw-pending { background: color-mix(in srgb, var(--vermilion) 12%, var(--paper)); border: 2px solid var(--vermilion); }
  .legend .sw-fal { background: repeating-linear-gradient(122deg, var(--ink) 0 4px, color-mix(in srgb, var(--ink) 70%, var(--paper)) 4px 5px); }
  .legend .sw-cor { background: var(--sel-wash); border: 1.5px solid var(--vermilion); }
  .legend em { font-family: var(--kai); font-style: normal; color: var(--vermilion); letter-spacing: .03em; }

  /* 一个承重层 */
  .stratum { position: relative; padding: 0 0 4px 40px; margin-top: 4px; }
  .stratum.lit .stratum-head { box-shadow: -6px 0 0 0 var(--vermilion); }
  .stratum-head {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 12px;
    padding: 10px 8px 9px 0; border-top: 1px solid var(--hair-strong); margin-left: -40px; padding-left: 40px;
    transition: box-shadow .2s;
  }
  .stratum:first-of-type .stratum-head { border-top: none; }
  .st-pos { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-2); }
  .st-name { font-family: var(--serif-zh); font-size: 16px; font-weight: 600; color: var(--ink); }
  .st-role { font-family: var(--sans); font-size: 11px; color: var(--ink-2); flex: 1 1 auto; min-width: 120px; }
  .st-haz {
    font-family: var(--kai); font-size: 13px; letter-spacing: .04em; white-space: nowrap;
    padding: 1px 9px; border: 1px solid currentColor;
  }
  .st-haz.intact { color: var(--own); }
  .st-haz.bearing { color: var(--vermilion); }
  .st-haz.fractured { color: var(--ink); background: var(--ink); }
  .st-haz.fractured { color: var(--paper); }
  .st-haz.pending { color: var(--paper); background: var(--vermilion); border-color: var(--vermilion); font-weight: 600; }
  .st-empty { font-family: var(--kai); font-size: 13px; color: var(--own); padding: 8px 0 12px; letter-spacing: .04em; }

  /* 应力点挂载：缩进 + 承重色载荷线 */
  .mounts { margin: 0; padding: 0; }
  .stress {
    position: relative; margin: 12px 0 4px; padding: 0 4px 4px 22px;
    border-left: 2px solid var(--hair-strong);
  }
  .stress.v-bearing { border-left-color: var(--vermilion); }
  .stress.v-fractured { border-left-color: var(--ink); }
  .stress.v-pending { border-left-color: var(--vermilion); }
  .stress::before {
    content: ""; position: absolute; left: -6px; top: 8px; width: 9px; height: 9px;
    transform: rotate(45deg); background: var(--paper); border: 2px solid var(--hair-strong);
  }
  .stress.v-bearing::before { border-color: var(--vermilion); background: var(--sel-wash); }
  .stress.v-fractured::before { border-color: var(--ink); background: var(--ink); }
  .stress.v-pending::before { border-color: var(--vermilion); background: var(--vermilion); box-shadow: 0 0 0 3px var(--sel-wash); }

  .s-head { display: flex; flex-wrap: wrap; align-items: center; gap: 7px 11px; margin-bottom: 7px; }
  .sno { font-family: var(--mono); font-size: 11px; letter-spacing: .06em; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .sno b { color: var(--vermilion); font-weight: 600; }
  .stype { font-family: var(--sans); font-size: 11px; letter-spacing: .02em; color: var(--ink); border: 1px solid var(--hair-strong); padding: 1px 8px; white-space: nowrap; }
  .mount-chip { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-2); border: 1px dashed var(--hair-strong); padding: 1px 6px; white-space: nowrap; }
  .sev { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
  .gravity { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .gravity i { width: 2px; height: 12px; background: var(--hair-strong); display: block; }
  .gravity[data-g="3"] i { background: var(--ink); }
  .gravity[data-g="2"] i:nth-child(-n+2) { background: var(--ink); }
  .gravity[data-g="1"] i:nth-child(1) { background: var(--ink); }
  .sev-lab { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--ink-2); }
  .sev-lab.crit { color: var(--ink); font-weight: 600; }

  .statement { font-family: var(--serif-zh); font-size: 16.5px; line-height: 1.62; color: var(--ink); margin: 0 0 11px; letter-spacing: .005em; text-wrap: pretty; }

  /* 审稿人朱批（楷体·朱红） */
  .anno { position: relative; padding: 1px 0 1px 16px; margin: 0 0 13px; border-left: 2px solid var(--vermilion); }
  .anno .sig { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-2); display: block; margin-bottom: 1px; }
  .anno p { margin: 0; font-family: var(--kai); font-size: 14.5px; line-height: 1.66; color: var(--vermilion); letter-spacing: .04em; }

  /* 裁决 + 双面密度 */
  .after { opacity: 0; }
  .ruling { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 15px; margin-bottom: 5px; }
  .vb { font-family: var(--serif-zh); font-size: 12.5px; letter-spacing: .05em; display: inline-flex; align-items: center; gap: 6px; padding: 3px 11px; border: 1px solid transparent; white-space: nowrap; }
  .vb .g { font-family: var(--mono); font-size: 8px; letter-spacing: .1em; text-transform: uppercase; opacity: .85; }

<script>
/* ══ 内联规范数据（抄自 BRIEF-adversarial.md，勿改） ══ */
const ADV_TOPIC = "平台经济中的数据权力与法律规制";

        type: "反例", severity: "致命", verdict: "已证伪", en_hits: 63, zh_hits: 3,
        note: "存在反例即证伪「前提」这一强命题；退到「有帮助」还能守，「前提」守不住。",
        evidence: [
          { title: "The DMA's Conduct Rules Without Ownership", url: "https://doi.org/10.2139/ssrn.4477201", stance: "证伪" },

        type: "机制缺环", severity: "致命", verdict: "未决", en_hits: 12, zh_hits: null,
        note: "红队最狠的一条：方向可能是反的，而你连机制都没写。检索未得直接证据——不放行。",
        evidence: [] },
      { id: "1d", statement: "主张是应然命题，却引实然确权立法进展作佐证，二者不同质。",
        type: "规范·实证混淆", severity: "存疑", verdict: "有佐证", en_hits: 27, zh_hits: 6,
        note: "「立法在推进」不等于「确权应当是前提」，是-应然跨越未搭桥。",
        evidence: [
          { title: "Is–Ought in Data Legislation Arguments", url: "https://doi.org/10.1111/jols.12488", stance: "证伪" },
        ] },
    ],
  },
  {
    id: 2,
    text: "裁判文书大数据能客观呈现法院对数据监管的真实立场。",
    from: "draft",
    failures: [
      { id: "2a", statement: "文书网选择性公开 + 撤诉不上网，样本非随机，任何回归都可能被样本偏差颠覆。",
        type: "样本偏差", severity: "致命", verdict: "已证伪", en_hits: 156, zh_hits: 34,
        note: "实证法学审稿人的标准杀招；不校正样本，「客观呈现」四个字站不住。",
        evidence: [
          { title: "Selection Bias in Chinese Judgment Datasets", url: "https://doi.org/10.1017/als.2022.19", stance: "证伪" },
          { title: "裁判文书网公开率与样本偏差", url: "https://kns.cnki.net/kcms/sample-3312", stance: "证伪" },
        ] },
      { id: "2b", statement: "把「立场」操作化为判决结果，忽略调解/不起诉/未成讼，构念效度存疑。",
        type: "内生性", severity: "重大", verdict: "未决", en_hits: 20, zh_hits: 5,
        note: "你测的是「判了的」，不是「立场」；未检得效度校验的先例——不放行。",
        evidence: [] },
      { id: "2c", statement: "相关 ≠ 因果：回归揭示的「裁量偏好」可能只是案由分布的假象。",
        type: "机制缺环", severity: "存疑", verdict: "有佐证", en_hits: 88, zh_hits: 12,
        note: "至少要做案由分层或断点，才敢从系数跳到「偏好」。",
        evidence: [
          { title: "Correlation, Case Mix, and Judicial Preference", url: "https://doi.org/10.1086/jls.2021.0207", stance: "佐证" },
        ] },
    ],
  },
];

/* ══ 小工具 ══ */
const $ = (s, el = document) => el.querySelector(s);
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const CN = { 1: "一", 2: "二", 3: "三", 4: "四", 5: "五" };
function shortHost(url){
  try { const h = new URL(url).hostname.replace(/^www\./,''); if (h.includes("cnki")) return "cnki"; if (h.includes("doi")) return "doi"; return h; }
  catch(e){ return ""; }
}

/* 承重结构：顶板·结论 → 主梁·推理 → 地基·前提 →（侧向）拉索·佐证 */
const MEMBERS = [
  { key: "apex",  pos: "结论", name: "顶板 · 结论", role: "主张要托起的断言（受力顶端）" },
  { key: "beam",  pos: "推理", name: "主梁 · 推理", role: "前提通往结论的承重推理（主受力梁）" },
  { key: "base",  pos: "前提", name: "地基 · 前提", role: "主张立足的概念与经验地基" },
  { key: "brace", pos: "佐证", name: "拉索 · 佐证", role: "为主张拉撑的证据（侧向拉索）" },
];
/* 失败类型 → 它攻击的承重位置 */
const TYPE_MEMBER = {
  "反例": "apex",            // 反例直击结论
  "机制缺环": "beam",         // 机制缺失 = 主梁断链
  "内生性": "beam",          // 内生性 = 推理梁被混淆
  "概念滑坡": "base",         // 概念偷换 = 地基松动
  "样本偏差": "base",         // 样本偏差 = 经验地基不实
  "规范·实证混淆": "brace",   // 是-应然错配 = 拉索用错料
};
const SEV = { "致命": { g: 3, crit: true, rank: 3, w: 9 }, "重大": { g: 2, crit: false, rank: 2, w: 6 }, "存疑": { g: 1, crit: false, rank: 1, w: 3 } };
/* 裁决三态 → 结构危度（未决=悬，已证伪=断，有佐证=载）；未决权重最高 */
const VERD = {
  "未决":  { state: "pending",   vb: "pending",   g: "悬", label: "悬而未决", w: 100 },
  "已证伪": { state: "fractured", vb: "fractured", g: "断", label: "已证伪",   w: 60 },
  "有佐证": { state: "bearing",   vb: "bearing",   g: "载", label: "有佐证",   w: 20 },
};
const HAZ = {
  intact:    { label: "结构完好" },
  bearing:   { label: "载 · 有佐证" },
  fractured: { label: "断 · 已证伪" },
  pending:   { label: "悬 · 险情未定" },
};

/* ══ 状态 ══ */
let MODE = "draft";      // draft | input
let ACTIVE = 1;          // 被解剖主张 id
const getClaim = (id) => ADV_CLAIMS.find(c => c.id === id);
function claimIdsForMode(){
  if (MODE === "input") return [1];
  const picked = ADV_DRAFTS.find(d => d.picked) || ADV_DRAFTS[0];
  return picked.claims.slice();
}

/* 把一条主张的失败点按承重位置分组 + 算每根构件的危度 */
function anatomize(claim){
  const byKey = { apex: [], beam: [], base: [], brace: [] };
  claim.failures.forEach(f => { byKey[TYPE_MEMBER[f.type] || "beam"].push(f); });
  const members = MEMBERS.map(m => {
    const fs = byKey[m.key];
    let has = { 未决: false, 已证伪: false, 有佐证: false };
    let score = 0, worstRank = 0, worstSev = "";
    fs.forEach(f => {
      has[f.verdict] = true;
      score = Math.max(score, VERD[f.verdict].w + SEV[f.severity].w);
      if (SEV[f.severity].rank > worstRank){ worstRank = SEV[f.severity].rank; worstSev = f.severity; }
    });
    let state = "intact";
    if (has["未决"]) state = "pending";
    else if (has["已证伪"]) state = "fractured";
    else if (has["有佐证"]) state = "bearing";
    return { ...m, failures: fs, state, score, worstSev, count: fs.length };
  });
  // 最先断：危度分最高者（未决·致命 会拔到最高）
  let breakIdx = -1, top = 0;
  members.forEach((m, i) => { if (m.count && m.score > top){ top = m.score; breakIdx = i; } });
  members.forEach((m, i) => m.firstBreak = (i === breakIdx));
  return members;
}
function tallyOf(claim){
  const t = { total: claim.failures.length, 致命: 0, 重大: 0, 存疑: 0, 未决: 0, 已证伪: 0, 有佐证: 0 };
  claim.failures.forEach(f => { t[f.severity]++; t[f.verdict]++; });
  return t;
}

/* ══ 解剖台头（模式相关） ══ */
function renderBenchCtx(){
  const ctx = $("#benchCtx");
  if (MODE === "draft"){
    const opts = ADV_DRAFTS.map(d =>
      `<option value="${esc(d.name)}"${d.picked ? " selected" : ""}>${esc(d.name)}${d.claims.length ? "（主张 " + d.claims.length + "）" : "（无可抽主张）"}</option>`
    ).join("");
    ctx.innerHTML = `<span class="ctx-label">草稿</span>
      <select class="draft-select" id="draftSel" aria-label="草稿选择器">${opts}</select>`;
    $("#draftSel").addEventListener("change", () => { /* 视觉稿：仅一篇有主张，保持 */ });
  } else {
    const c = getClaim(ACTIVE);
    ctx.innerHTML = `<span class="ctx-label">主张</span>
      <input class="claim-in" id="claimIn" type="text" value="${esc(c.text)}" aria-label="主张输入框">
      <button class="send-card" id="sendCard" type="button">从构思幕卡片送入 →</button>`;
    $("#claimIn").addEventListener("input", (e) => {
      const t = $(".subj-text");
      if (t) t.textContent = e.target.value || "（待输入主张）";
    });
    $("#sendCard").addEventListener("click", () => {
      const inp = $("#claimIn");
      inp.value = c.text;
      const t = $(".subj-text"); if (t) t.textContent = c.text;
      if (!reduce){ inp.classList.remove("pulse"); void inp.offsetWidth; inp.classList.add("pulse"); }
    });
  }
}

/* ══ 左：立面 · 受力总览 ══ */
function elevationHTML(members){
  let html = `<div class="load-arrow" aria-hidden="true"><span class="ar">↓</span> 载 · 受力自结论压下</div>`;
  members.forEach((m, i) => {
    const haz = HAZ[m.state].label;
    const meta = m.count
      ? `应力 ${m.count} · ${m.worstSev ? "量级 " + m.worstSev : ""}`
      : `无应力 · 结构完好`;
    const fb = m.firstBreak ? `<span class="first-break">最先断</span>` : "";
    html += `<button class="mbar role-${m.key} ${m.state}" type="button" data-key="${m.key}"
        aria-label="${esc(m.name)}，危度 ${esc(haz)}，${esc(meta)}">
        ${fb}
        <span class="m-top">
          <span class="m-pos">${esc(m.pos)}</span>
          <span class="m-name">${esc(m.name.split(" · ")[0])}</span>
          <span class="m-haz">${esc(haz)}</span>
        </span>
        <span class="m-meta">${esc(meta)}</span>
      </button>`;
    // 构件间接头（拉索为侧向连接，其余为竖向载荷线）
    if (m.key === "base"){
      const next = members[i + 1];
      const cls = next && next.state === "pending" ? "hot" : (next && next.state === "fractured" ? "ink" : "");
      html += `<div class="joint brace-tie ${cls}" aria-hidden="true"></div>`;
    } else if (i < members.length - 1){
      const next = members[i + 1];
      const cls = (m.state === "pending" || next.state === "pending") ? "hot"
                : (m.state === "fractured" || next.state === "fractured") ? "ink" : "";
      html += `<div class="joint ${cls}" aria-hidden="true"></div>`;
    }
  });
  html += `<div class="ground" aria-hidden="true"></div>`;
  return html;
}
function verdictLineHTML(members, t){
  const broke = members.filter(m => m.state === "fractured").map(m => m.pos);
  const sway  = members.filter(m => m.state === "pending").map(m => m.pos);
  const bits = [];
  if (broke.length) bits.push(`<span class="broke">${broke.join("、")}已断</span>`);
  if (sway.length)  bits.push(`<span class="sway">${sway.join("、")}悬而未决</span>`);
  const bearingOnly = !broke.length && !sway.length && members.some(m => m.state === "bearing");
  if (!bits.length) bits.push(bearingOnly ? "各承重层均有据承载" : "尚无应力点挂载");
  const tail = sway.length
    ? `<span class="tail">强度未测的梁未消，结构不予签发 · 无证据不放行。</span>`
    : (broke.length
        ? `<span class="tail">带断构，须重立承重层方可签发。</span>`
        : `<span class="tail calm">承重层暂稳，可续深挖。</span>`);
  return `<div class="verdict-line">${bits.join(" · ")}${tail}</div>`;
}
function renderElevation(){
  const claim = getClaim(ACTIVE);
  const members = anatomize(claim);
  const t = tallyOf(claim);
  const picked = ADV_DRAFTS.find(d => d.picked) || ADV_DRAFTS[0];
  const lead = MODE === "draft" ? "被解剖主张 · 抽自草稿" : "被解剖主张 · 无稿送入";

  let alts = "";
  const ids = claimIdsForMode();
  if (MODE === "draft" && ids.length > 1){
    const others = ids.filter(id => id !== ACTIVE).map(id => {
      const oc = getClaim(id), ot = tallyOf(oc);
      const mx = ot.未决 > 0 ? `<span class="amx">未决 ${ot.未决}</span>` : "";
      return `<button class="alt" type="button" data-claim="${id}"><span class="an">主张${CN[id]}</span>${esc(oc.text)}${mx}</button>`;
    }).join("");
    alts = `<div class="alts"><h2>同台 · 待解剖主张</h2>${others}</div>`;
  }
  const source = MODE === "draft"
    ? `卷宗 · <span class="k">${esc(picked.name)}</span>`
    : `来源 · <span class="k">${claim.from === "card" ? "构思幕卡片" : "手输主张"}</span>`;

  $("#elevCol").innerHTML = `
    <span class="subj-plate">受力对象</span>
    <div class="stagger" style="animation-delay:40ms">
      <span class="subj-lead">${lead}</span>
      <p class="subj-text">${esc(claim.text)}</p>
      <figure class="elevation" role="group" aria-label="承重结构立面图 · 结论压于顶、地基立于底，红为应力未决之梁">
        ${elevationHTML(members)}
      </figure>
      <p class="elev-cap">读法 · 载自<b>结论</b>压下，经<b>主梁</b>传至<b>地基</b>，拉索侧向拉撑；<b>红</b>= 应力未决之梁，标「最先断」。点构件可高亮下方对应承重层。</p>
      ${verdictLineHTML(members, t)}
      <div class="tally">
        <span>量级 <b>致命 ${t.致命}</b> · 重大 ${t.重大} · 存疑 ${t.存疑}</span>
      </div>
      <div class="tally">
        <span>危度 断(已证伪) ${t.已证伪} · 载(有佐证) ${t.有佐证} · <span class="warn">悬(未决) ${t.未决}</span></span>
      </div>
      ${alts}
      <div class="elev-source">${source}</div>
    </div>`;

  $("#elevCol").querySelectorAll(".alt").forEach(b =>
    b.addEventListener("click", () => { ACTIVE = +b.dataset.claim; renderAll(false); }));
  $("#elevCol").querySelectorAll(".mbar").forEach(b =>
    b.addEventListener("click", () => litStratum(b.dataset.key)));
}

/* ══ 右：承重逐层 · 应力点 ══ */
function densityHTML(f){
  const zh = (f.zh_hits === null) ? `<span class="nul">中文面未检</span>` : `<span class="zh">中 ${f.zh_hits}</span>`;
  return `<span class="density"><span class="dl">双面密度</span>
    <span class="en">英 ${f.en_hits}</span><span class="sep">·</span>${zh}</span>`;
}
function evidenceHTML(f){
  const items = f.evidence.map(e => {
    const st = e.stance === "证伪" ? "refute" : "support";
    return `<li class="evrow"><span class="ev-stance ${st}">${esc(e.stance)}</span>
      <a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.title)}</a>
      <span class="host">${esc(shortHost(e.url))}</span></li>`;
  }).join("");
  return `<details class="evi"><summary>证据链 ${f.evidence.length} 条</summary>
    <ul class="evlist">${items}</ul></details>`;
}
function pendingBlockHTML(f){
  const unlock = (f.zh_hits === null)
    ? `解锁 · <b>需 CNKI 会话</b>补检中文面，或英文换词后复议。`
    : `解锁 · <b>补检索 / 换词</b>后复议（英 ${f.en_hits} · 中 ${f.zh_hits} 均未得直接证据）。`;
  return `<div class="pending-block">
    <div class="bar"><span class="seal">悬</span>未检得证据 · 不放行</div>
    <div class="unlock">${unlock}</div></div>`;
}
function stressHTML(f, m, i){
  const sev = SEV[f.severity], v = VERD[f.verdict];
  const claimId = String(f.id).replace(/[a-z]/g, "");
  const bars = "<i></i><i></i><i></i>";
  const rd = reduce ? 0 : (i * 90 + 300);
  const keyAction = f.verdict === "未决"
    ? `<button class="abtn key" type="button" data-act="prove">送 to-prove · 补证放行</button>`
    : `<button class="abtn key" type="button" data-act="prove">送 to-prove</button>`;
  return `<article class="stress v-${v.state} stagger" id="stress-${esc(f.id)}" style="animation-delay:${reduce ? 0 : i * 90}ms">
    <div class="s-head">
      <span class="sno">应力 <b>${esc(f.id)}</b></span>
      <span class="stype">${esc(f.type)}</span>
      <span class="mount-chip">挂位 · ${esc(m.pos)}</span>
      <span class="sev" title="量级 · ${esc(f.severity)}">
        <span class="gravity" data-g="${sev.g}" aria-hidden="true">${bars}</span>
        <span class="sev-lab ${sev.crit ? "crit" : ""}">${esc(f.severity)}</span>
      </span>
    </div>
    <p class="statement">${esc(f.statement)}</p>
    <div class="anno"><span class="sig">审稿人朱批</span><p>${esc(f.note)}</p></div>
    <div class="after" style="--rd:${rd}ms">
      <div class="ruling">
        <span class="vb ${v.vb}"><span class="g">危度</span>${esc(v.label)}</span>
        <span class="vb-note" style="font-family:var(--sans);font-size:11px;color:var(--ink-2)">应力压在<b style="font-weight:600;color:var(--ink)">${esc(m.pos)}</b>层</span>
        ${f.verdict === "未决" ? "" : densityHTML(f)}
      </div>
      ${f.verdict === "未决" ? pendingBlockHTML(f) + `<div style="margin-top:6px">${densityHTML(f)}</div>` : evidenceHTML(f)}
      <div class="sactions" role="group" aria-label="对本应力点的处置">
        <span class="al">处置</span>
        ${keyAction}
        <button class="abtn" type="button" data-act="diagnose">送 diagnose</button>
        <span class="sent-mark">✓ 已挂入 failure-points</span>
      </div>
    </div>
  </article>`;
}
function stratumHTML(m, si){
  const haz = HAZ[m.state].label;
  const worst = m.count && m.worstSev ? `量级 ${m.worstSev}` : "";
  const body = m.count
    ? `<div class="mounts">${m.failures.map((f, i) => stressHTML(f, m, i)).join("")}</div>`
    : `<div class="st-empty">结构完好 · 此承重层暂无应力点</div>`;
  return `<section class="stratum" id="stratum-${m.key}" data-key="${m.key}" style="${reduce ? "" : "animation-delay:" + (si * 70) + "ms"}">
    <div class="stratum-head stagger" style="${reduce ? "" : "animation-delay:" + (si * 70) + "ms"}">
      <span class="st-pos">${esc(m.pos)}</span>
      <span class="st-name">${esc(m.name.split(" · ")[0])}</span>
      <span class="st-role">${esc(m.role)}${worst ? " · " + worst : ""}</span>
      <span class="st-haz ${m.state}">${esc(haz)}${m.count ? " · 应力 " + m.count : ""}</span>
    </div>
    ${body}
  </section>`;
}
function renderStrata(){
  const claim = getClaim(ACTIVE);
  const members = anatomize(claim);
  $("#strata").innerHTML = members.map((m, si) => stratumHTML(m, si)).join("");
  wireStress();
}
function wireStress(){
  $("#strata").querySelectorAll(".sactions").forEach(grp => {
    grp.querySelectorAll(".abtn").forEach(btn => {
      btn.addEventListener("click", () => {
        const on = btn.classList.contains("is-on");
        grp.querySelectorAll(".abtn").forEach(b => b.classList.remove("is-on"));
        if (on){ grp.classList.remove("done"); }
        else { btn.classList.add("is-on"); grp.classList.add("done"); }
      });
    });
  });
}

/* 点立面构件 → 高亮对应承重层 */
let litTimer = null;
function litStratum(key){
  const sec = $("#stratum-" + key);
  if (!sec) return;
  document.querySelectorAll(".stratum.lit").forEach(s => s.classList.remove("lit"));
  sec.classList.add("lit");
  sec.scrollIntoView({ behavior: reduce ? "auto" : "smooth", block: "center" });
  clearTimeout(litTimer);
  litTimer = setTimeout(() => sec.classList.remove("lit"), 1800);
}

/* ══ 签发笔录 ══ */
function renderRecord(){
  const claim = getClaim(ACTIVE);
  const members = anatomize(claim);
  const t = tallyOf(claim);
  const perMember = members.filter(m => m.count).map(m =>
    `${m.pos}（${HAZ[m.state].label}）`).join(" · ");
  const blockLine = t.未决 > 0
    ? `<div><span class="rk">签发</span><span class="block">⚠ ${CN[t.未决] || t.未决} 根梁悬而未决 · 结构不予签发（补检索 / 换词 / 需 CNKI 会话后复议）</span></div>`
    : `<div><span class="rk">签发</span>无悬梁，各承重层有据 · 准予签发。</div>`;
  $("#record").innerHTML = `
    <div><span class="rk">主题</span>${esc(ADV_TOPIC)}</div>
    <div><span class="rk">被解剖主张</span>${esc(claim.text)}</div>
    <div><span class="rk">承重险情</span>${perMember || "（无应力挂载）"}</div>
    <div><span class="rk">应力</span>${t.total} 点 · 量级 致命 ${t.致命} / 重大 ${t.重大} / 存疑 ${t.存疑}</div>
    <div><span class="rk">危度</span>断 ${t.已证伪} · 载 ${t.有佐证} · 悬 ${t.未决}</div>
    ${blockLine}
    <div style="margin-top:6px"><span class="rk">写入</span><span class="path">$PAPER_MUSE_OUTPUT_DIR/failure-points.md</span></div>`;
}

/* ══ 总装 ══ */
function renderAll(rebuildCtx = true){
  if (rebuildCtx) renderBenchCtx();
  renderElevation();
  renderStrata();
  renderRecord();
}

/* ══ 模式切换 ══ */
function setMode(m){
  MODE = m; ACTIVE = 1;
  $("#modeDraft").setAttribute("aria-pressed", String(m === "draft"));
  $("#modeInput").setAttribute("aria-pressed", String(m === "input"));
  renderAll(true);
}

/* ══ 复解：重放逐层立 + 应力挂载 ══ */
function replay(){ renderElevation(); renderStrata(); }

/* ══ 明暗切换 ══ */
function wireTheme(){
  const btn = $("#themeBtn"), root = document.documentElement;
  btn.addEventListener("click", () => {
    const dark = root.getAttribute("data-theme") === "dark";
    root.setAttribute("data-theme", dark ? "light" : "dark");
    btn.textContent = dark ? "☾" : "☀";
    btn.setAttribute("aria-label", dark ? "切换到暗色主题" : "切换到亮色主题");
  });
}

/* ══ 签发抽屉 ══ */
function wireColophon(){
  const box = $("#colophon");
  $("#fileBtn").addEventListener("click", () => {
    const open = box.classList.toggle("open");
    box.setAttribute("aria-hidden", String(!open));
  });
  $("#coloClose").addEventListener("click", () => {
    box.classList.remove("open"); box.setAttribute("aria-hidden", "true");
  });
}

/* ══ 启动 ══ */
renderAll(true);
wireTheme();
wireColophon();
$("#modeDraft").addEventListener("click", () => setMode("draft"));
$("#modeInput").addEventListener("click", () => setMode("input"));
$("#reviewBtn").addEventListener("click", replay);
$("#backAct").addEventListener("click", () => {
  const b = $("#backAct"), old = b.textContent;
  b.textContent = "← 构思幕（占位）";
  setTimeout(() => { b.textContent = old; }, 1400);
});
</script>
</body>
