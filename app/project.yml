name: PaperMuse
options:
  bundleIdPrefix: com.xianwei
targets:
  PaperMuse:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources: [Sources, Assets.xcassets]
    postBuildScripts:
      - name: Stage release server assets
        basedOnDependencyAnalysis: false
        script: |
          if [ "$CONFIGURATION" = "Release" ]; then
            /usr/bin/python3 "$SRCROOT/../tools/release_assets.py" stage --output "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/server"
            /usr/bin/python3 "$SRCROOT/../tools/release_assets.py" scan "$TARGET_BUILD_DIR/$WRAPPER_NAME"
          else
            rm -rf "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/server"
          fi
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: 论文构思者
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "3"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xianwei.papermuse
        SWIFT_VERSION: "5.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
